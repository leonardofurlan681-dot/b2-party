<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 STREET | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #25D366; --bg: #050505; --card: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; }

        /* Tela de Login */
        #login-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { 
            background: var(--card); padding: 40px; border-radius: 20px; 
            border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
        }

        /* Header com Vídeo */
        .admin-header { 
            width: 100%; height: 300px; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }
        .admin-header video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .header-content { position: absolute; z-index: 10; text-align: center; }
        .header-content h1 { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* Layout */
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: -60px; }
        
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 25px; border-radius: 15px; position: relative; z-index: 20;
        }
        .card h2 { font-size: 1rem; margin-bottom: 20px; text-transform: uppercase; color: var(--accent); }

        /* Inputs Premium */
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 15px; background: #000; 
            border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-add { background: var(--accent); color: #000; }
        .btn-logout { background: #ff4444; color: #fff; margin-top: 20px; font-size: 0.7rem; padding: 8px; }

        /* Lista de Produtos */
        .product-list { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .item-adm { 
            background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .item-info img { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; margin-right: 10px; }
        .btn-del { color: #ff4444; cursor: pointer; padding: 10px; }

        @media (max-width: 768px) {
            .admin-header { height: 200px; }
            .grid-forms { margin-top: 20px; }
        }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <img src="logo.jpg" style="width: 120px; margin-bottom: 20px;">
        <h2 style="margin-bottom: 20px; font-size: 0.9rem;">ACESSO RESTRITO</h2>
        <input type="email" id="login-email" placeholder="E-mail">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn btn-add" onclick="login()">Entrar no Painel</button>
    </div>
</div>

<!-- PAINEL ADM (Invisível até logar) -->
<div id="admin-panel" style="display: none;">
    <header class="admin-header">
        <video autoplay loop muted playsinline>
            <source src="video.mov" type="video/mp4">
        </video>
        <div class="header-content">
            <h1>Painel de Controle</h1>
            <p>B2 STREET URBAN PREMIUM</p>
            <button class="btn btn-logout" onclick="logout()">Sair do Sistema</button>
        </div>
    </header>

    <div class="container">
        <div class="grid-forms">
            <!-- Cadastrar Produto -->
            <div class="card">
                <h2><i class="fas fa-plus-circle"></i> Novo Produto</h2>
                <input type="text" id="p-nome" placeholder="Nome do Produto">
                <input type="text" id="p-preco" placeholder="Preço (ex: 199,90)">
                <input type="text" id="p-img" placeholder="Link da Imagem (URL)">
                <select id="p-cat">
                    <option value="tenis">Tênis</option>
                    <option value="camisas">Camisas</option>
                    <option value="conjuntos">Conjuntos</option>
                    <option value="shorts">Shorts</option>
                    <option value="joias">Joias</option>
                </select>
                <button class="btn btn-add" onclick="saveProduct()">Publicar Produto</button>
            </div>

            <!-- Cadastrar Banner -->
            <div class="card">
                <h2><i class="fas fa-image"></i> Novo Banner Slider</h2>
                <input type="text" id="b-url" placeholder="Link da Imagem do Banner">
                <button class="btn btn-add" onclick="saveBanner()">Adicionar ao Carrossel</button>
            </div>
        </div>

        <h2 style="margin-top: 50px; text-transform: uppercase; font-size: 1rem;">Gerenciar Itens</h2>
        <div id="adm-list" class="product-list"></div>
    </div>
</div>

<script>
// CONFIGURAÇÃO FIREBASE (IGUAL AO SEU SITE)
const firebaseConfig = {
    apiKey: "AIzaSyD1Phuyxe5du5aMPG3rn4BxAiKdYp0uFuI",
    authDomain: "b2-street-501f4.firebaseapp.com",
    projectId: "b2-street-501f4",
    storageBucket: "b2-street-501f4.firebasestorage.app",
    messagingSenderId: "975888104452",
    appId: "1:975888104452:web:1d02d83e0155c67a3fc951",
    databaseURL: "https://b2-street-501f4-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// FUNÇÕES DE LOGIN
function login() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    auth.signInWithEmailAndPassword(email, pass)
        .catch(err => alert("Erro ao acessar: " + err.message));
}

function logout() { auth.signOut(); }

// MONITOR DE AUTENTICAÇÃO
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadItems();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-panel').style.display = 'none';
    }
});

// SALVAR DADOS
function saveProduct() {
    const nome = document.getElementById('p-nome').value;
    const preco = document.getElementById('p-preco').value;
    const imagem = document.getElementById('p-img').value;
    const categoria = document.getElementById('p-cat').value;

    if(!nome || !preco || !imagem) return alert("Preencha tudo!");

    db.ref('produtos').push({ nome, preco, imagem, categoria })
    .then(() => { alert("Produto Salvo!"); location.reload(); });
}

function saveBanner() {
    const url = document.getElementById('b-url').value;
    if(!url) return alert("Insira o link!");
    db.ref('banners').push({ url })
    .then(() => { alert("Banner Salvo!"); location.reload(); });
}

// CARREGAR E DELETAR
function loadItems() {
    const list = document.getElementById('adm-list');
    list.innerHTML = "";

    // Produtos
    db.ref('produtos').on('value', snap => {
        snap.forEach(p => {
            const data = p.val();
            list.innerHTML += `
                <div class="item-adm">
                    <div class="item-info" style="display:flex; align-items:center;">
                        <img src="${data.imagem}">
                        <span>${data.nome}</span>
                    </div>
                    <i class="fas fa-trash btn-del" onclick="deleteItem('produtos/${p.key}')"></i>
                </div>
            `;
        });
    });

    // Banners
    db.ref('banners').on('value', snap => {
        snap.forEach(b => {
            list.innerHTML += `
                <div class="item-adm" style="border-color: #555;">
                    <span>BANNER: ${b.key.substring(0,5)}...</span>
                    <i class="fas fa-trash btn-del" onclick="deleteItem('banners/${b.key}')"></i>
                </div>
            `;
        });
    });
}

function deleteItem(path) {
    if(confirm("Deseja realmente excluir?")) {
        db.ref(path).remove();
    }
}
</script>
</body>
</html>
